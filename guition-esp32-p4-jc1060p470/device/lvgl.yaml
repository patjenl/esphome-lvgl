lvgl:
  displays: my_display
  byte_order: little_endian
  
  top_layer:
    widgets:
    
      # Temperature
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      # Clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: main_page
      layout: 
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:
        - obj:
            id: Dining_Room_Hang_Lights
            x: 20
            y: 20
            width: 200
            height: 100
            bg_color: 0x070E1B
            bg_opa: 95%
            border_width: 1
            border_color: 0x162038
            border_opa: 20%
            radius: 16
            shadow_width: 0
            shadow_color: 0xFBBF24
            shadow_opa: 0%
            scrollbar_mode: "OFF"
            pad_all: 0
            widgets:
              - bar:
                  id: dm_bar_accent
                  x: 10
                  y: 10
                  width: 4
                  height: 80
                  value: 100
                  min_value: 0
                  max_value: 100
                  indicator:
                    bg_color: 0xFBBF24
                    radius: 3
                  bg_color: 0x0F1929
                  radius: 9999
              - label:
                  id: dm_lbl_room
                  x: 20
                  y: 30
                  width: 94
                  height: 18
                  text: "Hang Lights"
                  text_color: 0xF1F5F9
                  text_align: LEFT
                  long_mode: CLIP
                  text_font: montserrat_14
              - label:
                  id: dm_lbl_pct
                  x: 120
                  y: 17
                  width: 70
                  height: 24
                  text: "75%"
                  text_color: 0xFBBF24
                  text_align: RIGHT
                  long_mode: CLIP
                  text_font: montserrat_20
              - label:
                  id: dm_lbl_sub
                  x: 20
                  y: 54
                  width: 170
                  height: 14
                  text: "Dining Room Hang lights"
                  text_color: 0x8E9FB8
                  text_align: LEFT
                  long_mode: CLIP
                  text_font: montserrat_10
              - slider:
                  id: dm_slider
                  x: 20
                  y: 74
                  width: 170
                  height: 16
                  value: 100
                  min_value: 0
                  max_value: 255
                  bg_color: 0x0F1929
                  border_width: 0
                  radius: 9999
                  bg_opa: 100%
                  knob:
                    bg_color: 0xFFFFFF
                    border_width: 0
                    radius: 50
                    pad_all: 0
                  indicator:
                    bg_color: 0xFBBF24
                    bg_opa: 80%
                    radius: 8
                  animated: true
                  on_release:
                    - homeassistant.action:
                        action: light.turn_on
                        data:
                          entity_id: light.shellydimmer2_hanglights
                        data_template:
                          brightness: !lambda return int(x);
                    
        # Office Features Scene
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_features_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: scene_features_icon                
                  text: $ledstrip
              - label:
                  align: bottom_left
                  id: scene_features_label
                  text: "Features"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_features_stateful_scene

        # Office Calls Scene
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_calls_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_calls_icon                
                  text: $videocall
              - label:
                  align: bottom_left
                  id: office_scene_calls_label
                  text: "Calls"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_calls_stateful_scene

        # Office Evening Scene
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_evening_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_evening_icon                
                  text: $nightlight
              - label:
                  align: bottom_left
                  id: office_scene_evening_label
                  text: "Evening"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_evening_stateful_scene

        # Office Dimmed Scene
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_scene_dimmed_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: office_scene_dimmed_icon                
                  text: $nightlight
              - label:
                  align: bottom_left
                  id: office_scene_dimmed_label
                  text: "Dimmed"
            on_press:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_dimmed_stateful_scene

        # Office Blind 100%
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_open_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Open"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "100"

        # Office Blind 66%
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_66_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Semi Open"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "66"

        # Office Blind 33%
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_33_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Semi Closed"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "33"

        # Office Blind 0%
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_blind_close_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_closed
              - label:
                  align: bottom_left
                  text: "Close"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.office_blind
                    position: "0"


        # 3d Printer
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: printer_power_button
            styles: control
            widgets:
              # Icon (shown when OFF)
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: printer_power_icon
                  text: $printer
              # Progress (shown when ON)
              - obj:
                  align: top_left
                  id: print_progress_container
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: statistics_font
                        text_color: $button_text_color
                        id: print_progress_label
                        text: "--"
                    - label:
                        text_font: label_font
                        text_color: $button_text_color
                        text: "%"
                        pad_bottom: 6
              - label:
                  align: bottom_left
                  text: "Printer"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_3d_printer_power

        # Filament Heater
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: filament_heater_button
            styles: control
            widgets:
              # Icon (shown when OFF)
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: filament_heater_icon
                  text: $filament
              # Humidity (shown when ON)
              - obj:
                  align: top_left
                  id: dryer_humidity_container
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  hidden: true
                  widgets:
                    - label:
                        text_font: statistics_font
                        text_color: $button_text_color
                        id: dryer_humidity_label
                        text: "--"
                    - label:
                        text_font: label_font
                        text_color: $button_text_color
                        text: "%"
                        pad_bottom: 6
                        pad_left: -4
              - label:
                  align: bottom_left
                  text: "Dryer"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.office_filament_heater_893b

        # Office Aircon
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: office_aircon_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $aircon
              - label:
                  align: bottom_left
                  text: "Aircon"
            on_click:
              - homeassistant.service:
                  service: script.office_air_conditioner

        # Battery Charger
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: battery_charger_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: battery_charger_icon
                  text: $battery
              - label:
                  align: bottom_left
                  id: battery_charger_label
                  text: "Charger"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.battery_charger

        # Storage Lights
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: storage_lights_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: storage_lights_icon
                  text: $package
              - label:
                  align: bottom_left
                  id: storage_lights_label
                  text: "Storage"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_storage

        # Network Rack
        - button: 
            height: $button_height
            width: $button_width
            checkable: true
            id: network_rack_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: network_rack_icon
                  text: $network
              - label:
                  align: bottom_left
                  id: network_rack_label
                  text: "Network Rack"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.office_network_rack
